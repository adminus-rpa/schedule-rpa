# =========================================================================
# КОНФИГУРАЦИЯ ВЕБ-РАСПИСАНИЯ
# Изменения в этом файле применяются "на лету" — сервер перечитывает файл
# автоматически (без перезапуска). Клиент подхватывает изменения при
# ближайшем цикле опроса /api/config (раз в 5 секунд).
# =========================================================================

database:
  # Полный путь к MDB-файлу на файловом сервере.
  # На Windows: используйте прямые слэши или двойные обратные, например:
  #   path: "//fileserver/share/25-26 учебный год.mdb"
  #   path: "C:/rasp/25-26 учебный год.mdb"
  path: "//kzn1sfs02/Экспресс-расписание ВУЗ/CompactBD/25-26 учебный год.mdb"

  # Драйвер: auto | pyodbc | mdbtools
  # auto — pyodbc на Windows, mdbtools на Linux
  driver: "auto"

  # Access ODBC-драйвер (только для pyodbc). Не трогать, если не знаете.
  odbc_driver: "Microsoft Access Driver (*.mdb, *.accdb)"

sync:
  # Интервал синхронизации сервера с БД (секунды). По ТЗ — 15 минут.
  interval_seconds: 900

  # Таймаут одной операции чтения БД (секунды).
  read_timeout_seconds: 60

  # Сколько последних успешных снимков держать в памяти (для отказоустойчивости —
  # если БД вдруг недоступна, отдаём последний удачный).
  snapshots_kept: 3

display:
  # Длительность выводимого расписания.
  # Допустимо: day | week | 2weeks | 3weeks | month
  period: "day"

  # С какого дня начинать отсчёт для "week/2weeks/..."
  # today  — с сегодня
  # monday — с понедельника текущей недели
  start: "today"

  # Показывать выходные (суббота/воскресенье)?
  show_weekends: false

  # Автоматически скрывать пустые группы (нет ни одного занятия в периоде)
  hide_empty_groups: true

  # Разделение экрана:
  #   left_college | left_university | vertical
  #   college_only | university_only
  #   alternate — попеременно колледж и вуз на весь экран
  layout: "alternate"

  # Интервал переключения (секунды) в режиме alternate.
  alternate_interval_seconds: 600

  # Показывать преподавателя в карточке?
  show_teacher: true

  # =========================================================================
  # ПАГИНАЦИЯ ГРУПП (вертикальный layout)
  # =========================================================================
  groups_per_page: 0
  group_col_min_px: 220
  group_col_max_px: 340

  # Интервал переключения страниц групп внутри одной панели (секунды).
  page_interval_seconds: 15

  # Тип анимации при переключении страниц:
  #   slide | fade | zoom | flip | cube | stack | reveal | swap | none
  page_animation: "slide"
  # Длительность анимации переключения (миллисекунды).
  page_animation_ms: 600



  # =========================================================================
  # ТРОЕТОЧИЕ и СПЕЦ-ЗАМЕНЫ в названиях предметов/кабинетов
  # =========================================================================
  # Заголовок предмета: строго в одну строку, обрезается троеточием.
  subject_max_chars: 0

  # Автозамены применяются НА СТОРОНЕ СЕРВЕРА (в БД-репозитории).
  # Клиент получает уже нормализованные названия.
  #
  # Любые варианты ЭИОС («ЭИОС», «Э.И.О.С.», «с пр ЭИОС», «лек. ЭИОС»,
  # «пр. ЭИОС», «с/пр ЭИОС», «Электронная информационно-образовательная среда»
  # и т.д.) → один единый вид «ЭИОС».
  #
  # Анкоры \A / \Z гарантируют, что префиксы («с пр», «лек») бывают
  # съедены только в случаях, когда все осмысленное содержимое строки — ЭИОС.
  # «Информатика в ЭИОС» останется как есть.
  subject_replacements:
    # 1) Полное название (опционально с префиксом-типом занятия)
    "\\A\\s*(?:(?:лекция|лекц|лек|практика|практ|семинар|сем|конс|кол|лаб|сам|пр|л|с|к|н)\\.?[\\s/\\\\\\-\\.]*){0,3}Электронн[а-я]*[\\s\\-]+информационн[а-я]*[\\s\\-]+образовательн[а-я]*[\\s\\-]+сред[а-я]*[\\.\\s]*\\Z": "ЭИОС"
    # 2) Аббревиатура ЭИОС/варианты (опционально с префиксом)
    "\\A\\s*(?:(?:лекция|лекц|лек|практика|практ|семинар|сем|конс|кол|лаб|сам|пр|л|с|к|н)\\.?[\\s/\\\\\\-\\.]*){0,3}(?:Э\\.?\\s*И\\.?\\s*О\\.?\\s*С\\.?|ЭИО[\\s\\-]?С|ЭИ[\\s\\-]?ОС)[\\.\\s]*\\Z": "ЭИОС"
    # 3) Мягкая нормализация «Э.И.О.С» / «Э И О С» / «ЭИО-С» внутри контекста
    "\\bЭ\\.\\s*И\\.\\s*О\\.\\s*С\\.?(?=\\W|$)": "ЭИОС"
    "\\bЭ\\s+И\\s+О\\s+С\\b": "ЭИОС"
    "\\b(?:ЭИО[\\s\\-]С|ЭИ[\\s\\-]ОС)\\b": "ЭИОС"
    "\\b[Ээ][Ии][Оо][Сс]\\b": "ЭИОС"
    # 4) Полное название внутри контекста
    "\\bЭлектронн[а-я]*\\s+информационн[а-я]*[\\s\\-]+образовательн[а-я]*\\s+сред[а-я]*\\b": "ЭИОС"
    "\\bЭлектронн[а-я]*[\\s\\-]+информационн[а-я]*[\\s\\-]+образовательн[а-я]*[\\s\\-]+сред[а-я]*\\b": "ЭИОС"

  # Автозамены и переносы для номера кабинета.
  room_replacements:
    "\\(Ст\\.\\s*с\\)":   "Ст.с"
    "\\(Ст\\.\\s*с\\.\\)": "Ст.с"
    # 0) Если аудитория не указана вообще или стоит прочерк — считаем, что это ЭИОС (по просьбе пользователя)
    "\\A\\s*[-—–]*\\s*\\Z": "ЭИОС"
    # 1) Полное название (опционально с префиксом-типом занятия)
    "\\A\\s*(?:(?:лекция|лекц|лек|практика|практ|семинар|сем|конс|кол|лаб|сам|пр|л|с|к|н)\\.?[\\s/\\\\\\-\\.]*){0,3}Электронн[а-я]*[\\s\\-]+информационн[а-я]*[\\s\\-]+образовательн[а-я]*[\\s\\-]+сред[а-я]*[\\.\\s]*\\Z": "ЭИОС"
    # 2) Аббревиатура ЭИОС/варианты (опционально с префиксом)
    "\\A\\s*(?:(?:лекция|лекц|лек|практика|практ|семинар|сем|конс|кол|лаб|сам|пр|л|с|к|н)\\.?[\\s/\\\\\\-\\.]*){0,3}(?:Э\\.?\\s*И\\.?\\s*О\\.?\\s*С\\.?|ЭИО[\\s\\-]?С|ЭИ[\\s\\-]?ОС)[\\.\\s]*\\Z": "ЭИОС"
    # 3) Мягкая нормализация «Э.И.О.С» / «Э И О С» / «ЭИО-С» внутри контекста
    "\\bЭ\\.\\s*И\\.\\s*О\\.\\s*С\\.?(?=\\W|$)": "ЭИОС"
    "\\bЭ\\s+И\\s+О\\s+С\\b": "ЭИОС"
    "\\b(?:ЭИО[\\s\\-]С|ЭИ[\\s\\-]ОС)\\b": "ЭИОС"
    "\\b[Ээ][Ии][Оо][Сс]\\b": "ЭИОС"
    # 4) Полное название внутри контекста
    "\\bЭлектронн[а-я]*\\s+информационн[а-я]*[\\s\\-]+образовательн[а-я]*\\s+сред[а-я]*\\b": "ЭИОС"
    "\\bЭлектронн[а-я]*[\\s\\-]+информационн[а-я]*[\\s\\-]+образовательн[а-я]*[\\s\\-]+сред[а-я]*\\b": "ЭИОС"

  # =========================================================================
  # ДИЗАЙН «ОСТРОВКОВ» ГРУПП И АНИМАЦИИ
  # =========================================================================
  # Рассеянное свечение вокруг островков групп (по умолчанию — выключено).
  island_glow_enabled: true
  # Цвет свечения. Пустая строка = использовать акцент (college/university).
  island_glow_color: ""
  # Радиус blur (px). Больше — более рассеянное свечение.
  island_glow_radius: 15
  # Непрозрачность 0..1.
  island_glow_opacity: 0.35 #0.35
  # Лёгкая пульсация свечения.
  island_glow_pulse: true

  # Дизайнерские анимации (иконки/названия панелей и т.д.)
  fancy_animations: true
  # Длительность общих микро-анимаций.
  micro_anim_ms: 420 #420

  # Прогресс-бар пагинации сверху панелей (показывает сколько страниц осталось).
  progress_bar_enabled: true

theme:
  # Основной пресет: light | dark | uni_blue | warm | contrast
  preset: "light"

  # Переопределение цветов.
  overrides:
    background: ""
    surface: ""
    text: ""
    accent_college: ""
    accent_university: ""
    lesson_bg: ""
    # Пастельно-сиреневый — цвет подсветки текущей пары.
    # accent_now: "#b39ddb"

  # Фоновое изображение.
  background_image: "/static/wallpaper.jpg"
  background_opacity: 0.0

  # Цвета номера кабинета по этажу (первая цифра номера = этаж).
  floor_colors:
    "1": "#0ea5e9"
    "2": "#10b981"
    "3": "#f59e0b"
    "4": "#ef4444"
    "5": "#8b5cf6"
    "6": "#ec4899"
    "7": "#14b8a6"
    "8": "#f97316"
    "9": "#6366f1"
    default: "#64748b"

typography:
  cell_font_size: 0.9
  header_font_size: 1.15
  title_font_size: 1.55

  font_family: "'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif"

behavior:
  hide_topbar_on_load: true
  client_refresh_seconds: 60
  client_config_poll_seconds: 5
  show_status_indicator: true
  show_clock: true
  # Автоматический переход в полноэкранный режим при первом клике/касании.
  # По умолчанию выключено (F11 доступен всегда).
  fullscreen_on_first_interaction: false

logging:
  level: "INFO"
  file: "./logs/app.log"
  max_bytes: 5242880
  backup_count: 5

