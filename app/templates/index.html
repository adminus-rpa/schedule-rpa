<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Расписание занятий</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/fonts.css') }}">
  {% if assets.css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/' + assets.css) }}">
  {% else %}
    <!-- Fallback: dev-режим или сборка отсутствует -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% endif %}
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
  <style id="theme-vars">
    :root {
      --bg:            {{ theme.background }};
      --surface:       {{ theme.surface }};
      --surface-2:     {{ theme.surface_2 or theme.header_bg }};
      --text:          {{ theme.text }};
      --text-muted:    {{ theme.text_muted }};
      --accent-college:    {{ theme.accent_college }};
      --accent-university: {{ theme.accent_university }};
      --accent-now:    {{ theme.accent_now or '#b39ddb' }};
      --lesson-bg:     {{ theme.lesson_bg }};
      --lesson-border: {{ theme.lesson_border }};
      --grid-line:     {{ theme.grid_line }};
      --header-bg:     {{ theme.header_bg }};
      --font-family:   {{ cfg.typography.font_family|safe }};
      --cell-fs:       {{ cfg.typography.cell_font_size }}rem;
      --header-fs:     {{ cfg.typography.header_font_size }}rem;
      --title-fs:      {{ cfg.typography.title_font_size }}rem;
      --bg-image:      none;
      --bg-image-opacity: {{ cfg.theme.background_opacity }};
      --anim-ms:       {{ cfg.display.page_animation_ms }}ms;
      --micro-anim-ms: {{ cfg.display.micro_anim_ms or 420 }}ms;
      --island-glow-radius: {{ cfg.display.island_glow_radius or 40 }}px;
      --island-glow-opacity: {{ cfg.display.island_glow_opacity or 0.35 }};
    }
  </style>
</head>
<body data-layout="{{ cfg.display.layout }}"
      data-active-panel="university"
      data-fancy="{{ 'on' if cfg.display.fancy_animations else 'off' }}"
      data-glow="{{ 'on' if cfg.display.island_glow_enabled else 'off' }}"
      data-glow-pulse="{{ 'on' if cfg.display.island_glow_pulse else 'off' }}"
      data-progress="{{ 'on' if cfg.display.progress_bar_enabled else 'off' }}">

  <div id="app"></div>

  <script>
    window.__BOOT__ = {{ boot | tojson }};
  </script>

  {% if assets.js %}
    <script type="module" src="{{ url_for('static', filename='dist/' + assets.js) }}"></script>
  {% else %}
    <!-- Fallback: сборка отсутствует. Соберите фронтенд командой:
         cd frontend && npm install && npm run build -->
    <div style="padding:2rem;font-family:sans-serif;color:#c00">
      <h2>Сборка фронтенда отсутствует</h2>
      <p>Выполните: <code>cd frontend &amp;&amp; npm install &amp;&amp; npm run build</code></p>
    </div>
  {% endif %}
</body>
</html>
