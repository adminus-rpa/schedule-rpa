<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Расписание занятий (dev)</title>
  <link rel="stylesheet" href="/static/css/fonts.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
</head>
<body>
  <div id="app"></div>
  <script>
    // Заглушка BOOT для dev-режима. В проде значения приходят из Flask-шаблона.
    window.__BOOT__ = window.__BOOT__ || {
      default_start: new Date().toISOString().slice(0, 10),
      default_end:   new Date().toISOString().slice(0, 10),
      default_period:"day",
      show_clock:    true,
      show_status:   true,
      hide_topbar_on_load: false,
      client_refresh_seconds: 60,
      fullscreen_on_first_interaction: false
    };
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
